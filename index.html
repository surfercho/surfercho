<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surfercho | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>

/* ┌─────────────────────────────────────────────────────────┐
   │  SHARED  —  공통 변수 · 리셋 · 인트로 · NAV · 컨택트   │
   └─────────────────────────────────────────────────────────┘ */

:root {
    --bg:           linear-gradient(180deg, hsl(0,0%,20%) 0%, hsl(0,0%,10%) 100%);
    --text:         #fff;
    --ease:         cubic-bezier(0.23, 1, 0.32, 1);
    --transition:   1.1s var(--ease);
    --radius:       12px;
    --strip-height: 65vh;
    --nav-h-mob:    72px;
}

/* 태블릿에서 strip 높이 축소 — 확장 시 16/9 비율 너비가 vw 초과 방지 */
@media (min-width: 769px) and (max-width: 1024px) {
    :root {
        --strip-height: 46vh;
    }
}

* {
    margin:0; padding:0; box-sizing:border-box;
    -webkit-font-smoothing:antialiased;
    font-family:'Inter', -apple-system, sans-serif;
    cursor:default !important;
}

body { background:var(--bg); color:var(--text); overflow:hidden; width:100vw; height:100vh; }

/* Intro */
#intro-screen {
    position:fixed; inset:0;
    background:rgba(10,10,10,0.6);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    z-index:9000; display:flex; justify-content:center; align-items:center;
    transition:opacity 1.2s var(--ease), visibility 1.2s;
    cursor:pointer !important;
}
.intro-logo {
    font-size:clamp(36px,10vw,80px); font-weight:200;
    letter-spacing:clamp(8px,4vw,25px); text-transform:uppercase;
    animation:introReveal 2.5s var(--ease) forwards;
    pointer-events:none;
    text-align:center;
    text-indent:clamp(8px,4vw,25px);
}
.click-to-enter {
    position:absolute; bottom:10%;
    font-size:10px; letter-spacing:4px; opacity:0.4; animation:pulse 2s infinite;
}
@keyframes introReveal {
    0%   { opacity:0; transform:translateY(20px) scale(0.95); filter:blur(10px); }
    100% { opacity:1; transform:translateY(0)    scale(1);    filter:blur(0);    }
}
@keyframes pulse { 0%,100%{opacity:0.2;} 50%{opacity:0.5;} }
body.is-started #intro-screen { opacity:0; visibility:hidden; }

/* Nav */
nav {
    position:fixed; top:0; width:100%;
    display:flex; justify-content:space-between; align-items:center;
    z-index:4000; pointer-events:none;
}
.logo { letter-spacing:5px; font-size:14px; text-transform:uppercase; transition:opacity 0.5s var(--ease); }
.contact-trigger { font-size:12px; letter-spacing:2px; border-bottom:1px solid #fff; pointer-events:auto; cursor:pointer !important; }
body:not(.is-started) nav { opacity:0; }
body.is-started nav { opacity:1; transition:opacity 1s var(--ease) 0.5s; }

/* Contact overlay */
#contact-overlay {
    position:fixed; inset:0;
    background:rgba(10,10,10,0.85);
    backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px);
    z-index:7000; display:flex; flex-direction:column; justify-content:center; align-items:center;
    opacity:0; visibility:hidden; transition:all 0.6s var(--ease);
    cursor:pointer !important;
}
#contact-overlay.active { opacity:1; visibility:visible; }
.contact-list { list-style:none; text-align:center; pointer-events:auto; }
.contact-item { margin:20px 0; overflow:hidden; }
.contact-link {
    font-size:18px; font-weight:300; text-transform:uppercase; letter-spacing:6px;
    color:rgba(255,255,255,0.5); text-decoration:none; display:inline-block;
    transition:color 0.4s var(--ease); cursor:pointer !important; position:relative; padding:8px 0;
}
.contact-link:hover { color:#fff; }
.contact-link::after {
    content:''; position:absolute; bottom:0; left:0;
    width:0; height:1px; background:#fff; transition:width 0.4s var(--ease);
}
.contact-link:hover::after { width:100%; }

/* Toast */
#toast {
    position:fixed; bottom:50px; left:50%; transform:translateX(-50%);
    background:#fff; color:#000; padding:12px 24px;
    font-size:11px; font-weight:600; letter-spacing:2px; border-radius:2px;
    opacity:0; transition:opacity 0.4s var(--ease); z-index:8000; pointer-events:none;
}


/* ┌─────────────────────────────────────────────────────────┐
   │  PC ONLY  (min-width: 1025px)                           │
   └─────────────────────────────────────────────────────────┘ */

@media (min-width: 1025px) {

    nav { padding:40px 60px; }

    .close-project {
        position:fixed; top:40px; left:60px; z-index:6000; display:none;
        font-size:12px; letter-spacing:2px; mix-blend-mode:difference; cursor:pointer !important;
    }
    body.is-detail .close-project { display:block; }
    body.is-detail .logo { opacity:0; pointer-events:none; }

    #detail-pagers {
        position:fixed; top:110px; left:50%; transform:translateX(-50%);
        display:flex; gap:8px; z-index:3500; opacity:0; visibility:hidden;
        transition:all 0.8s var(--ease); padding:8px; border-radius:8px;
        max-width:90vw; flex-wrap:wrap; justify-content:center;
    }
    body.is-detail #detail-pagers { opacity:1; visibility:visible; }
    .pager-item {
        width:70px; height:50px; border-radius:4px; background-size:cover; background-position:center;
        opacity:0.3; transition:all 0.4s var(--ease); cursor:pointer !important;
        border:1px solid rgba(255,255,255,0.2); background-color:#333;
    }
    .pager-item:hover { opacity:0.7; }
    .pager-item.active { opacity:1; border-color:#fff; transform:scale(1.1); }

    #stage {
        position:relative; display:flex; width:100vw; height:100vh;
        justify-content:center; align-items:center; perspective:2000px; overflow:hidden;
        transition:padding-top var(--transition), filter 1.5s var(--ease), background-color var(--transition);
    }
    body:not(.is-started) #stage { filter:blur(20px) scale(1.1); }
    body.is-detail         #stage { background-color:rgba(0,0,0,0.7); }

    .project-strip {
        position:absolute; top:50%; transform:translate(-50%,-50%);
        border-radius:var(--radius); z-index:10;
        display:flex; align-items:center; justify-content:center;
        opacity:0.4; background-color:transparent;
        transition:width var(--transition), height var(--transition),
                   transform var(--transition), left var(--transition), opacity 0.4s ease, z-index 0s;
        will-change:transform, width, height, left; cursor:pointer !important; overflow:hidden;
    }
    body:not(.is-detail) .project-strip:not(.expanded):not(.peek):hover {
        opacity:1 !important;
        transition:opacity 0.25s ease, width var(--transition), height var(--transition),
                   transform var(--transition), left var(--transition), z-index 0s;
    }
    body:not(.is-detail) .project-strip:not(.expanded):not(.peek):hover .strip-img-wrapper
        { transform:scale(1.07); transition:transform 0.5s var(--ease); }
    body:not(.is-detail) .project-strip:not(.expanded):not(.peek):hover .thumb-title
        { opacity:1; transition:opacity 0.25s ease; }
    .project-strip.peek:hover {
        opacity:0.6 !important;
        transition:width var(--transition), height var(--transition),
                   transform var(--transition), left var(--transition), opacity 0.3s ease, z-index 0s !important;
    }

    .strip-img-wrapper {
        width:100%; height:100%; position:absolute; border-radius:var(--radius);
        overflow:hidden; z-index:1; background-color:transparent;
        transition:transform 0.5s var(--ease); background-size:cover; background-position:center;
    }
    .project-strip.expanded .strip-img-wrapper { background-color:#000; }

    .detail-photos { position:absolute; width:100%; height:100%; opacity:0; transition:opacity 0.6s var(--ease); z-index:2; }
    .expanded .detail-photos { opacity:1; }

    .photo {
        position:absolute; width:100%; height:100%; opacity:0;
        transition:opacity 0.8s var(--ease);
        background-size:cover; background-repeat:no-repeat; background-position:center;
    }
    .photo.active { opacity:1; }

    .photo-nav {
        position:absolute; top:50%; transform:translateY(-50%);
        background:none; color:rgba(255,255,255,0.3); font-size:54px; font-weight:200;
        z-index:10; opacity:0; visibility:hidden; transition:opacity 0.3s var(--ease);
        cursor:default !important; user-select:none; outline:none;
    }
    .project-strip.expanded .photo-nav { opacity:1; visibility:visible; }
    .photo-nav-prev { left:30px; }
    .photo-nav-next { right:30px; }

    .thumb-title {
        position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-90deg);
        font-size:11px; font-weight:300; letter-spacing:5px; opacity:0.6; z-index:10;
        text-transform:uppercase; white-space:nowrap; transition:opacity 0.4s;
    }
    .project-strip.expanded .thumb-title { opacity:0; }

    #fixed-expanded-title {
        position:fixed; top:calc(100vh - 160px); left:50%; transform:translateX(-50%);
        z-index:4000; opacity:0; transition:opacity 0.8s var(--ease) 0.3s;
    }
    body.is-detail #fixed-expanded-title { opacity:1; }
    .expanded-title { font-size:16px; font-weight:400; letter-spacing:10px; color:#fff; text-transform:uppercase; line-height:1; }

    /* 모바일 전용 요소 완전 숨김 */
    #mobile-layout { display:none !important; }

    /* PC에서 태블릿용 래퍼는 완전 투명 패스스루 */
    #tab-stage-scroll { position:fixed; inset:0; width:100vw; height:100vh; overflow:hidden; }
    #tab-nav-border   { display:none !important; }
}


/* ┌─────────────────────────────────────────────────────────┐
   │  TABLET  (769px ~ 1024px) — PC 레이아웃 기반 보정      │
   └─────────────────────────────────────────────────────────┘ */

@media (min-width: 769px) and (max-width: 1024px) {

    nav { padding:30px 40px; }

    .close-project {
        position:fixed; top:30px; left:40px; z-index:6000; display:none;
        font-size:12px; letter-spacing:2px; mix-blend-mode:difference; cursor:pointer !important;
    }
    body.is-detail .close-project { display:block; }
    body.is-detail .logo { opacity:0; pointer-events:none; }

    #detail-pagers {
        position:fixed; top:90px; left:50%; transform:translateX(-50%);
        display:flex; gap:6px; z-index:3500; opacity:0; visibility:hidden;
        transition:all 0.8s var(--ease); padding:6px; border-radius:8px;
        max-width:90vw; flex-wrap:wrap; justify-content:center;
    }
    body.is-detail #detail-pagers { opacity:1; visibility:visible; }
    .pager-item {
        width:52px; height:36px; border-radius:4px; background-size:cover; background-position:center;
        opacity:0.3; transition:all 0.4s var(--ease); cursor:pointer !important;
        border:1px solid rgba(255,255,255,0.2); background-color:#333;
    }
    .pager-item:hover { opacity:0.7; }
    .pager-item.active { opacity:1; border-color:#fff; transform:scale(1.1); }

    /* ── 태블릿 가로 시: 스크롤 래퍼 ── */
    #tab-stage-scroll {
        position: fixed;
        inset: 0;
        width: 100vw; height: 100vh;
        overflow-x: auto; overflow-y: hidden;
        scrollbar-width: none; -ms-overflow-style: none;
        -webkit-overflow-scrolling: touch;
    }
    #tab-stage-scroll::-webkit-scrollbar { display: none; }

    /* is-detail 진입 시 스크롤 잠금 */
    body.is-detail #tab-stage-scroll { overflow: hidden; }

    #stage {
        /* 스크롤 래퍼 안에서 실제 너비를 strip 전체 합으로 늘림 — JS가 주입 */
        position:relative; display:flex; height:100vh;
        justify-content:flex-start; align-items:center; perspective:1400px;
        transition:filter 1.5s var(--ease), background-color var(--transition);
        /* overflow 제거 — 래퍼가 담당 */
    }
    body:not(.is-started) #stage { filter:blur(20px) scale(1.1); }
    body.is-detail         #stage { background-color:rgba(0,0,0,0.7); }

    .project-strip {
        position:absolute; top:50%; transform:translate(-50%,-50%);
        border-radius:var(--radius); z-index:10;
        display:flex; align-items:center; justify-content:center;
        opacity:0.4; background-color:transparent;
        transition:width var(--transition), height var(--transition),
                   transform var(--transition), left var(--transition), opacity 0.4s ease, z-index 0s;
        will-change:transform, width, height, left; cursor:pointer !important; overflow:hidden;
    }
    body:not(.is-detail) .project-strip:not(.expanded):not(.peek):hover {
        opacity:1 !important;
        transition:opacity 0.25s ease, width var(--transition), height var(--transition),
                   transform var(--transition), left var(--transition), z-index 0s;
    }
    body:not(.is-detail) .project-strip:not(.expanded):not(.peek):hover .strip-img-wrapper
        { transform:scale(1.07); transition:transform 0.5s var(--ease); }
    body:not(.is-detail) .project-strip:not(.expanded):not(.peek):hover .thumb-title
        { opacity:1; transition:opacity 0.25s ease; }
    .project-strip.peek:hover {
        opacity:0.6 !important;
        transition:width var(--transition), height var(--transition),
                   transform var(--transition), left var(--transition), opacity 0.3s ease, z-index 0s !important;
    }

    .strip-img-wrapper {
        width:100%; height:100%; position:absolute; border-radius:var(--radius);
        overflow:hidden; z-index:1; background-color:transparent;
        transition:transform 0.5s var(--ease); background-size:cover; background-position:center;
    }
    .project-strip.expanded .strip-img-wrapper { background-color:#000; }

    .detail-photos { position:absolute; width:100%; height:100%; opacity:0; transition:opacity 0.6s var(--ease); z-index:2; }
    .expanded .detail-photos { opacity:1; }

    .photo {
        position:absolute; width:100%; height:100%; opacity:0;
        transition:opacity 0.8s var(--ease);
        background-size:cover; background-repeat:no-repeat; background-position:center;
    }
    .photo.active { opacity:1; }

    .photo-nav {
        position:absolute; top:50%; transform:translateY(-50%);
        background:none; color:rgba(255,255,255,0.3); font-size:40px; font-weight:200;
        z-index:10; opacity:0; visibility:hidden; transition:opacity 0.3s var(--ease);
        cursor:default !important; user-select:none; outline:none;
    }
    .project-strip.expanded .photo-nav { opacity:1; visibility:visible; }
    .photo-nav-prev { left:20px; }
    .photo-nav-next { right:20px; }

    .thumb-title {
        position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-90deg);
        font-size:10px; font-weight:300; letter-spacing:4px; opacity:0.6; z-index:10;
        text-transform:uppercase; white-space:nowrap; transition:opacity 0.4s;
    }
    .project-strip.expanded .thumb-title { opacity:0; }

    #fixed-expanded-title {
        position:fixed; top:calc(100vh - 130px); left:50%; transform:translateX(-50%);
        z-index:4000; opacity:0; transition:opacity 0.8s var(--ease) 0.3s;
    }
    body.is-detail #fixed-expanded-title { opacity:1; }
    .expanded-title { font-size:14px; font-weight:400; letter-spacing:8px; color:#fff; text-transform:uppercase; line-height:1; }

    /* ── 태블릿 세로(portrait) — is-detail 진입 시 nav 경계 ── */
    @media (orientation: portrait) {
        /* mob-detail 과 동일한 frosted 경계를 #stage 위에 얹음 */
        #tab-nav-border {
            display: block;
            position: fixed;
            top: 0; left: 0; right: 0;
            /* nav padding 30px + 글자 높이 약 20px + 여유 */
            height: 80px;
            background: linear-gradient(
                to bottom,
                hsl(0,0%,18%) 0%,
                hsl(0,0%,18%) 70%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 3500;
            opacity: 0;
            transition: opacity 0.4s var(--ease);
        }
        body.is-detail #tab-nav-border { opacity: 1; }
    }
    @media (orientation: landscape) {
        #tab-nav-border { display: none; }
    }

    /* 모바일 전용 요소 완전 숨김 */
    #mobile-layout { display:none !important; }
}


/* ┌─────────────────────────────────────────────────────────┐
   │  MOBILE ONLY  (max-width: 768px)                        │
   └─────────────────────────────────────────────────────────┘ */

@media (max-width: 768px) {

    nav { padding:20px 24px; height:var(--nav-h-mob); }
    .logo { font-size:12px; letter-spacing:3px; }

    .contact-trigger {
        font-size:11px;
        letter-spacing:2px;
    }

    .close-project {
        position:fixed; top:20px; left:24px; z-index:6000; display:none;
        font-size:11px; letter-spacing:2px;
        line-height:1; padding-bottom:1px;
        mix-blend-mode:difference; cursor:pointer !important;
    }
    body.is-detail .close-project { display:block; }
    body.is-detail .logo { opacity:0; pointer-events:none; }
    body.is-detail nav { pointer-events:none; }
    body.is-detail .contact-trigger { pointer-events:auto; }

    /* PC 전용 요소 완전 숨김 */
    #stage                { display:none !important; }
    #fixed-expanded-title { display:none !important; }
    #detail-pagers        { display:none !important; }

    /* ── 모바일 전체 래퍼 ── */
    #mobile-layout {
        display:block;
        width:100vw; height:100vh;
        position:relative;
    }

    #mob-grid-wrap {
        position:absolute; inset:0;
        overflow-y:auto; overflow-x:hidden;
        scrollbar-width:none; -ms-overflow-style:none;
        transition:opacity 0.5s var(--ease), visibility 0.5s;
    }
    #mob-grid-wrap::-webkit-scrollbar { display:none; }
    body.is-detail        #mob-grid-wrap { opacity:0; visibility:hidden; pointer-events:none; }
    body:not(.is-started) #mob-grid-wrap { filter:blur(16px); }

    #mob-nav-border {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: var(--nav-h-mob);
        background: linear-gradient(
            to bottom,
            hsl(0,0%,18%) 0%,
            hsl(0,0%,18%) 75%,
            transparent 100%
        );
        pointer-events: none;
        z-index: 3500;
        transition: opacity 0.4s var(--ease);
    }
    body.is-detail #mob-nav-border { opacity:0; }

    #mob-grid {
        display:flex;
        flex-direction:column;
        gap:14px;
        padding: var(--nav-h-mob) 20px 48px;
    }

    .mob-card {
        position:relative;
        width:100%;
        aspect-ratio:16/10;
        border-radius:var(--radius);
        overflow:hidden;
        cursor:pointer !important;
        opacity:0.72;
        transition:opacity 0.3s var(--ease), transform 0.3s var(--ease);
    }
    .mob-card:active { opacity:1; transform:scale(0.985); }

    .mob-card-bg {
        position:absolute; inset:0;
        background-size:cover; background-position:center;
        transition:transform 0.55s var(--ease);
    }
    .mob-card:active .mob-card-bg { transform:scale(1.04); }

    .mob-card-overlay {
        position:absolute; inset:0;
        background:linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 55%);
    }
    .mob-card-title {
        position:absolute; bottom:16px; left:18px;
        font-size:11px; font-weight:300; letter-spacing:5px;
        text-transform:uppercase; color:#fff; opacity:0.85;
    }

    #mob-detail {
        position: absolute; inset: 0;
        background: var(--bg);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        opacity: 0; visibility: hidden;
        transition: opacity 0.7s var(--ease), visibility 0.7s;
        pointer-events: none;
        overflow: hidden;
    }
    body.is-detail #mob-detail { opacity:1; visibility:visible; pointer-events:auto; }

    .mob-peek-card {
        width: calc(100% - 80px);
        aspect-ratio: 16/9;
        border-radius: var(--radius);
        overflow: hidden;
        flex-shrink: 0;
        position: relative;
        opacity: 0.25;
        cursor: pointer !important;
        background-size: cover; background-position: center;
        transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
    }
    .mob-peek-card:active { opacity:0.5; }

    #mob-peek-top    { transform: scale(0.88); transform-origin: bottom center; }
    #mob-peek-bottom { transform: scale(0.88); transform-origin: top center;    }

    .mob-peek-label {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 9px; font-weight: 300; letter-spacing: 4px;
        text-transform: uppercase; color: rgba(255,255,255,0.55);
        background: rgba(0,0,0,0.5);
        pointer-events: none;
    }

    #mob-main-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        width: 100%;
        flex-shrink: 0;
    }

    #mob-viewer {
        position: relative;
        width: calc(100% - 48px);
        aspect-ratio: 16/9;
        border-radius: var(--radius);
        overflow: hidden;
        flex-shrink: 0;
        z-index: 2;
        box-shadow: 0 16px 48px rgba(0,0,0,0.55);
    }

    .mob-slide {
        position: absolute; inset: 0;
        background-size: cover; background-position: center;
        opacity: 0; transition: opacity 0.65s var(--ease); pointer-events: none;
    }
    .mob-slide.active { opacity:1; pointer-events:auto; }

    .mob-tap-zone {
        position: absolute; top:0; bottom:0; width:50%;
        z-index: 5; cursor: pointer !important;
    }
    #mob-tap-prev { left:0; }
    #mob-tap-next { right:0; }

    .mob-tap-hint {
        position: absolute; top:50%; transform:translateY(-50%);
        font-size: 28px; font-weight:200; color:rgba(255,255,255,0.2);
        pointer-events:none; z-index:4;
        animation: hintFade 3s var(--ease) 0.8s forwards;
    }
    #mob-hint-prev { left:12px; }
    #mob-hint-next { right:12px; }
    @keyframes hintFade { 0%,70%{opacity:1;} 100%{opacity:0;} }

    #mob-info-bar {
        width: calc(100% - 48px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }
    #mob-detail-title {

    #mob-thumbs {
        display: flex;

        transition: opacity 0.3s var(--ease), border-color 0.3s, transform 0.3s var(--ease);

    .mob-thumb:active    { opacity: 0.7; }

}

</head>

<script>
/* ════════════════════════════════════════════════════════
   SHARED DATA
════════════════════════════════════════════════════════ */

const TITLES = ['LUGIA','B-Project','C-Project','D-Project','E-Project',
                'F-Project','G-Project','H-Project','I-Project','J-Project'];
const LABELS = ['a','b','c','d','e','f','g','h','i','j'];

const IMAGES = TITLES.map((_, i) => {
    const lbl = LABELS[i];
    const len = (i === 0) ? 7 : 10;
    if (i === 0) return Array.from({length:len}, (_,p) => `assets/project-${lbl}/${lbl} (${p+1}).png`);
    return Array.from({length:len}, (_,p) => `https://picsum.photos/seed/proj-${i}-${p}/1600/900`);
});

const body = document.body;

/* 태블릿 포함 모바일 여부 — 768px 이하만 모바일 레이아웃 */
const isMobile = () => window.innerWidth <= 768;

/* 태블릿 여부 (769~1024px) */
const isTablet = () => window.innerWidth >= 769 && window.innerWidth <= 1024;


/* ════════════════════════════════════════════════════════
   SHARED — Intro
════════════════════════════════════════════════════════ */

function handleIntroClick() {
    if (!body.classList.contains('is-started')) body.classList.add('is-started');
}


/* ════════════════════════════════════════════════════════
   SHARED — Contact / Toast
════════════════════════════════════════════════════════ */

function toggleContact() {
    document.getElementById('contact-overlay').classList.toggle('active');
}

function copyEmail(email) {
    navigator.clipboard.writeText(email).then(() => {
        const t = document.getElementById('toast');
        t.style.opacity = '1';
        setTimeout(() => { t.style.opacity = '0'; }, 2000);
    });
}


/* ════════════════════════════════════════════════════════
   SHARED — shrinkProject  (← BACK 버튼 공용 진입점)
════════════════════════════════════════════════════════ */

function shrinkProject() {
    isMobile() ? mobShrink() : pcShrink();
}


/* ╔═══════════════════════════════════════════════════════╗
   ║  PC / TABLET LOGIC                                    ║
   ╚═══════════════════════════════════════════════════════╝ */

(function pcInit() {
    const stage          = document.getElementById('stage');
    const pagerContainer = document.getElementById('detail-pagers');
    const expandedTitle  = document.querySelector('.expanded-title');

    let currentIndex = -1;

    /* ── Strip 생성 ── */
    stage.innerHTML = TITLES.map((t, i) => `
        <div class="project-strip strip-${i}" data-title="${t}" data-index="${i}">
            <div class="thumb-title">${t}</div>
            <div class="strip-img-wrapper" style="background-image:url('${IMAGES[i][0]}')">
                <div class="photo-nav photo-nav-prev" onclick="event.stopPropagation(); pcNav(${i},-1)">&#10216;</div>
                <div class="photo-nav photo-nav-next" onclick="event.stopPropagation(); pcNav(${i},1)">&#10217;</div>
                <div class="detail-photos">
                    ${IMAGES[i].map((url,p) => `
                        <div class="photo ${p===0?'active':''}" style="background-image:url('${url}')"></div>
                    `).join('')}
                </div>
            </div>
        </div>
    `).join('');

    const strips = document.querySelectorAll('.project-strip');
    layoutDefault();

    /* ── 클릭 이벤트 ── */
    strips.forEach(strip => {
        strip.addEventListener('click', function(e) {
            if (!body.classList.contains('is-started') || isMobile()) return;
            const idx = parseInt(this.dataset.index);
            if (this.classList.contains('expanded')) {
                const r = this.getBoundingClientRect();
                rotate(this, e.clientX - r.left < r.width / 2 ? -1 : 1);
                return;
            }
            showProject(idx);
        });
    });

    /* ── 레이아웃: 갤러리 기본 ── */
    function layoutDefault() {
        const half = (TITLES.length - 1) / 2;
        /* 태블릿은 간격·너비 축소 */
        const gap = isTablet() ? 130 : 215;
        const w   = isTablet() ? '115px' : '195px';

        strips.forEach((s, i) => {
            s.style.left = `calc(50vw + ${(i - half) * gap}px)`;
            s.style.top = '50%'; s.style.width = w; s.style.height = 'var(--strip-height)';
            s.style.transform = 'translate(-50%,-50%)'; s.style.opacity = '0.4';
            s.style.zIndex = '10'; s.style.pointerEvents = 'auto';
            s.classList.remove('expanded','peek');
        });

        /* 태블릿: stage 실제 너비 = 전체 strip 영역 + 양쪽 여백 */
        if (isTablet()) {
            const totalW = TITLES.length * gap;
            /* 50vw(첫 strip 중심) + half*gap 오른쪽 끝 + 반 strip + 여백 */
            stage.style.width = `calc(100vw + ${totalW}px)`;
            /* 스크롤을 중앙(첫 화면)부터 시작 */
            const scroll = document.getElementById('tab-stage-scroll');
            if (scroll) scroll.scrollLeft = totalW / 2 - scroll.clientWidth / 2 + gap / 2;
        } else {
            stage.style.width = '100vw';
        }
    }

    /* ── 레이아웃: 상세 확장 ── */
    function layoutDetail() {
        const n = TITLES.length;
        strips.forEach((s, i) => {
            s.style.top = '50%';
            if (i === currentIndex) {
                s.style.left = '50vw'; s.style.width = 'calc(var(--strip-height) * 16 / 9)';
                s.style.height = 'var(--strip-height)'; s.style.transform = 'translate(-50%,-50%)';
                s.style.opacity = '1'; s.style.zIndex = '3000'; s.style.pointerEvents = 'auto';
                s.classList.add('expanded'); s.classList.remove('peek');
            } else if (i === (currentIndex - 1 + n) % n) {
                s.style.left = '10vw'; s.style.width = '12vw'; s.style.height = 'var(--strip-height)';
                s.style.transform = 'translate(-50%,-50%) rotateY(15deg) scale(1.023)';
                s.style.opacity = '0.25'; s.style.zIndex = '1500'; s.style.pointerEvents = 'auto';
                s.classList.add('peek'); s.classList.remove('expanded');
            } else if (i === (currentIndex + 1) % n) {
                s.style.left = '90vw'; s.style.width = '12vw'; s.style.height = 'var(--strip-height)';
                s.style.transform = 'translate(-50%,-50%) rotateY(-15deg) scale(1.023)';
                s.style.opacity = '0.25'; s.style.zIndex = '1500'; s.style.pointerEvents = 'auto';
                s.classList.add('peek'); s.classList.remove('expanded');
            } else {
                s.style.left = i === (currentIndex - 2 + n) % n ? '-20vw'
                             : i === (currentIndex + 2) % n    ? '120vw' : '50vw';
                s.style.width = '12vw'; s.style.height = 'var(--strip-height)';
                s.style.transform = 'translate(-50%,-50%) scale(0.5)';
                s.style.opacity = '0'; s.style.zIndex = '1000'; s.style.pointerEvents = 'none';
                s.classList.remove('expanded','peek');
            }
        });
    }

    /* ── 프로젝트 열기 ── */
    function showProject(index) {
        const entering = !body.classList.contains('is-detail');
        currentIndex = index;
        if (expandedTitle) expandedTitle.innerText = TITLES[index];
        if (entering) body.classList.add('is-detail');

        const photos = strips[index].querySelectorAll('.photo');
        photos.forEach((p,i) => p.classList.toggle('active', i === 0));

        pagerContainer.innerHTML = Array.from(photos).map((photo, pIdx) => `
            <div class="pager-item ${pIdx===0?'active':''}"
                 style="${photo.getAttribute('style')}"
                 onclick="event.stopPropagation(); pcJump(${index},${pIdx})"></div>
        `).join('');

        if (entering) {
            strips.forEach((s, i) => {
                if (i === index) {
                    s.style.left = '50vw'; s.style.width = 'calc(var(--strip-height) * 16 / 9)';
                    s.style.height = 'var(--strip-height)'; s.style.transform = 'translate(-50%,-50%)';
                    s.style.opacity = '1'; s.style.zIndex = '3000'; s.style.pointerEvents = 'auto';
                    s.classList.add('expanded'); s.classList.remove('peek');
                } else {
                    s.style.transition = 'opacity 0.6s var(--ease)';
                    s.style.opacity = '0'; s.style.pointerEvents = 'none';
                }
            });
            setTimeout(() => { strips.forEach(s => { s.style.transition = ''; }); layoutDetail(); }, 600);
        } else {
            layoutDetail();
        }
    }

    /* ── 사진 이동 (전역 노출) ── */
    window.pcNav  = (idx, dir) => rotate(strips[idx], dir);
    window.pcJump = (projIdx, photoIdx) => {
        const photos = strips[projIdx].querySelectorAll('.photo');
        const pagers = pagerContainer.querySelectorAll('.pager-item');
        photos.forEach((p,i) => p.classList.toggle('active', i === photoIdx));
        pagers.forEach((pg,i) => pg.classList.toggle('active', i === photoIdx));
    };

    function rotate(strip, dir) {
        const photos = strip.querySelectorAll('.photo');
        const pagers = pagerContainer.querySelectorAll('.pager-item');
        if (!pagers.length) return;
        let idx = Array.from(photos).findIndex(p => p.classList.contains('active'));
        photos[idx].classList.remove('active');
        if (pagers[idx]) pagers[idx].classList.remove('active');
        idx = (idx + dir + photos.length) % photos.length;
        photos[idx].classList.add('active');
        if (pagers[idx]) pagers[idx].classList.add('active');
    }

    /* ── 프로젝트 닫기 (전역 노출) ── */
    window.pcShrink = function() {
        body.classList.remove('is-detail');
        const old  = currentIndex;
        currentIndex = -1;
        const n    = TITLES.length;
        const half = (n - 1) / 2;
        const gap  = isTablet() ? 130 : 215;
        const w    = isTablet() ? '115px' : '195px';

        strips[old].style.transition = '';
        strips[old].style.left = `calc(50vw + ${(old - half) * gap}px)`;
        strips[old].style.width = w; strips[old].style.height = 'var(--strip-height)';
        strips[old].style.transform = 'translate(-50%,-50%)';
        strips[old].style.opacity = '0.4'; strips[old].style.zIndex = '10';
        strips[old].style.pointerEvents = 'auto';
        strips[old].classList.remove('expanded','peek');

        const others = [];
        strips.forEach((s, i) => {
            if (i === old) return;
            s.style.transition = 'none';
            s.style.left = `calc(50vw + ${(i - half) * gap}px)`;
            s.style.width = w; s.style.height = 'var(--strip-height)';
            s.style.zIndex = '10'; s.style.opacity = '0';
            s.style.top = Math.random() > 0.5 ? 'calc(50% - 100px)' : 'calc(50% + 100px)';
            s.style.transform = 'translate(-50%,-50%)'; s.style.pointerEvents = 'none';
            s.classList.remove('expanded','peek');
            others.push(s);
        });
        for (let i = others.length-1; i > 0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [others[i], others[j]] = [others[j], others[i]];
        }
        requestAnimationFrame(() => { requestAnimationFrame(() => {
            others.forEach((s, idx) => {
                const delay = (idx * (1.0 / (others.length-1))).toFixed(2);
                s.style.transition = `top 0.5s var(--ease) ${delay}s, opacity 0.5s var(--ease) ${delay}s`;
                s.style.top = '50%'; s.style.opacity = '0.4'; s.style.pointerEvents = 'auto';
                setTimeout(() => { s.style.transition = ''; }, (parseFloat(delay)+0.5)*1000+100);
            });
        }); });
        pagerContainer.innerHTML = '';
        document.querySelectorAll('.photo').forEach(p =>
            p.classList.toggle('active', p === p.parentElement.querySelector('.photo'))
        );
    };

    /* ── 태블릿 가로 스크롤 바운스 ── */
    (function tabBounce() {
        if (!isTablet()) return;
        const scroll = document.getElementById('tab-stage-scroll');
        if (!scroll) return;

        const STIFFNESS  = 0.18;   /* 바운스 스프링 강도 */
        const DAMPING    = 0.72;   /* 감쇠 */
        const OVERSCROLL = 80;     /* px — 최대 바운스 */
        let rafId = null;
        let vel   = 0;
        let extra = 0;             /* 초과 변위 */
        let touching = false;
        let lastX    = 0;

        scroll.addEventListener('touchstart', e => {
            touching = true;
            lastX    = e.touches[0].clientX;
            vel      = 0;
            if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        }, { passive: true });

        scroll.addEventListener('touchmove', e => {
            if (!touching) return;
            const dx   = lastX - e.touches[0].clientX;
            lastX      = e.touches[0].clientX;
            const max  = scroll.scrollWidth - scroll.clientWidth;
            const cur  = scroll.scrollLeft;

            /* 끝에서 초과 시 저항 적용 */
            if ((cur <= 0 && dx < 0) || (cur >= max && dx > 0)) {
                extra += dx * 0.25;
                extra  = Math.max(-OVERSCROLL, Math.min(OVERSCROLL, extra));
                stage.style.transform = `translateX(${-extra}px)`;
            } else {
                scroll.scrollLeft += dx;
                vel = dx;
            }
        }, { passive: true });

        scroll.addEventListener('touchend', () => {
            touching = false;
            /* 바운스 복원 */
            if (Math.abs(extra) > 0.5) {
                (function spring() {
                    extra *= DAMPING;
                    extra -= extra * STIFFNESS * 5;
                    stage.style.transform = `translateX(${-extra}px)`;
                    if (Math.abs(extra) > 0.5) rafId = requestAnimationFrame(spring);
                    else { extra = 0; stage.style.transform = ''; }
                })();
            }
            /* 관성 스크롤 */
            (function inertia() {
                if (Math.abs(vel) < 0.5) { vel = 0; return; }
                vel      *= 0.92;
                const max = scroll.scrollWidth - scroll.clientWidth;
                scroll.scrollLeft = Math.max(0, Math.min(max, scroll.scrollLeft + vel));
                rafId = requestAnimationFrame(inertia);
            })();
        }, { passive: true });
    })();
})();


/* ╔═══════════════════════════════════════════════════════╗
   ║  MOBILE LOGIC                                         ║
   ╚═══════════════════════════════════════════════════════╝ */

(function mobInit() {
    const grid         = document.getElementById('mob-grid');
    const viewer       = document.getElementById('mob-viewer');
    const mainBlock    = document.getElementById('mob-main-block');
    const thumbsEl     = document.getElementById('mob-thumbs');
    const titleEl      = document.getElementById('mob-detail-title');
    const tapPrev      = document.getElementById('mob-tap-prev');
    const tapNext      = document.getElementById('mob-tap-next');
    const peekTop      = document.getElementById('mob-peek-top');
    const peekBottom   = document.getElementById('mob-peek-bottom');
    const peekTopLbl   = document.getElementById('mob-peek-top-label');
    const peekBotLbl   = document.getElementById('mob-peek-bottom-label');
    const EASE         = 'cubic-bezier(0.23, 1, 0.32, 1)';
    const DUR          = 750;

    let curProject = -1;
    let curPhoto   = 0;
    let switching  = false;

    /* ── 카드 목록 생성 ── */
    TITLES.forEach((t, i) => {
        const card = document.createElement('div');
        card.className = 'mob-card';
        card.innerHTML = `
            <div class="mob-card-bg" style="background-image:url('${IMAGES[i][0]}')"></div>
            <div class="mob-card-overlay"></div>
            <div class="mob-card-title">${t}</div>
        `;
        card.addEventListener('click', () => {
            if (!body.classList.contains('is-started')) return;
            showProject(i);
        });
        grid.appendChild(card);
    });

    tapPrev.addEventListener('click', () => rotatePhoto(-1));
    tapNext.addEventListener('click', () => rotatePhoto(1));

    function updatePeek(index) {
        const n    = TITLES.length;
        const prev = (index - 1 + n) % n;
        const next = (index + 1)     % n;
        peekTop.style.backgroundImage    = `url('${IMAGES[prev][0]}')`;
        peekBottom.style.backgroundImage = `url('${IMAGES[next][0]}')`;
        peekTopLbl.textContent = TITLES[prev];
        peekBotLbl.textContent = TITLES[next];
    }

    function loadContent(index) {
        titleEl.textContent = TITLES[index];

        viewer.querySelectorAll('.mob-slide').forEach(el => el.remove());
        IMAGES[index].forEach((url, p) => {
            const s = document.createElement('div');
            s.className = 'mob-slide' + (p === 0 ? ' active' : '');
            s.style.backgroundImage = `url('${url}')`;
            viewer.insertBefore(s, tapPrev);
        });

        thumbsEl.innerHTML = IMAGES[index].map((url, p) => `
            <div class="mob-thumb ${p === 0 ? 'active' : ''}"
                 style="background-image:url('${url}')"
                 onclick="event.stopPropagation(); mobJumpPhoto(${p})"></div>
        `).join('');

        updatePeek(index);
    }

    function showProject(index) {
        curProject = index;
        curPhoto   = 0;
        body.classList.add('is-detail');
        loadContent(index);
    }

    window.mobJumpPhoto = function(photoIdx) {
        viewer.querySelectorAll('.mob-slide').forEach((s, i) =>
            s.classList.toggle('active', i === photoIdx));
        thumbsEl.querySelectorAll('.mob-thumb').forEach((t, i) =>
            t.classList.toggle('active', i === photoIdx));
        curPhoto = photoIdx;
    };

    function rotatePhoto(dir) {
        const count = viewer.querySelectorAll('.mob-slide').length;
        mobJumpPhoto((curPhoto + dir + count) % count);
    }

    window.mobSwitchProject = function(dir) {
        if (switching) return;
        switching = true;

        const newIdx = (curProject + dir + TITLES.length) % TITLES.length;

        const outY = dir > 0 ? '-55px' : '55px';

        setStyle(mainBlock, {
            transition: `transform ${DUR}ms ${EASE}, opacity ${Math.round(DUR * 0.65)}ms ${EASE}`,
            transform:  `translateY(${outY})`,
            opacity:    '0'
        });
        [peekTop, peekBottom].forEach(pk => setStyle(pk, {
            transition: `transform ${DUR}ms ${EASE}, opacity ${Math.round(DUR * 0.55)}ms ${EASE}`,
            transform:  `scale(0.88) translateY(${dir > 0 ? '-18px' : '18px'})`,
            opacity:    '0'
        }));

        setTimeout(() => {
            curProject = newIdx;
            curPhoto   = 0;
            loadContent(newIdx);

            const inY = dir > 0 ? '55px' : '-55px';
            setStyle(mainBlock, { transition:'none', transform:`translateY(${inY})`, opacity:'0' });
            [peekTop, peekBottom].forEach(pk => setStyle(pk, {
                transition: 'none',
                transform:  `scale(0.88) translateY(${dir > 0 ? '18px' : '-18px'})`,
                opacity:    '0'
            }));

            requestAnimationFrame(() => requestAnimationFrame(() => {
                setStyle(mainBlock, {
                    transition: `transform ${DUR}ms ${EASE}, opacity ${Math.round(DUR * 0.8)}ms ${EASE}`,
                    transform:  'translateY(0)',
                    opacity:    '1'
                });
                [peekTop, peekBottom].forEach(pk => setStyle(pk, {
                    transition: `transform ${DUR}ms ${EASE}, opacity ${Math.round(DUR * 0.8)}ms ${EASE}`,
                    transform:  'scale(0.88)',
                    opacity:    '0.25'
                }));

                setTimeout(() => {
                    clearStyle(mainBlock);
                    clearStyle(peekTop);
                    clearStyle(peekBottom);
                    switching = false;
                }, DUR + 60);
            }));
        }, DUR * 0.42);
    };

    window.mobShrink = function() {
        body.classList.remove('is-detail');
        curProject = -1;
        clearStyle(mainBlock);
        clearStyle(peekTop);
        clearStyle(peekBottom);
        switching = false;
    };

    function setStyle(el, props) {
        Object.assign(el.style, props);
    }
    function clearStyle(el) {
        el.style.transition = '';
        el.style.transform  = '';
        el.style.opacity    = '';
    }
})();

</script>
</body>
</html>
