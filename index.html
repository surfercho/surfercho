<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surfercho | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>

:root {
    --bg:           linear-gradient(180deg, hsl(0,0%,20%) 0%, hsl(0,0%,10%) 100%);
    --text:         #fff;
    --ease:         cubic-bezier(0.23, 1, 0.32, 1);
    --transition:   1.1s var(--ease);
    --radius:       12px;
    --strip-height: 65vh;
    --nav-h-mob:    72px;
}

* {
    margin:0; padding:0; box-sizing:border-box;
    -webkit-font-smoothing:antialiased;
    font-family:'Inter', -apple-system, sans-serif;
    cursor:default !important;
}

body { background:var(--bg); color:var(--text); overflow:hidden; width:100vw; height:100vh; }

#intro-screen {
    position:fixed; inset:0;
    background:rgba(10,10,10,0.6);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    z-index:9000; display:flex; justify-content:center; align-items:center;
    transition:opacity 1.2s var(--ease), visibility 1.2s;
    cursor:pointer !important;
}
.intro-logo {
    font-size:clamp(36px,10vw,80px); font-weight:200;
    letter-spacing:clamp(8px,4vw,25px); text-transform:uppercase;
    animation:introReveal 2.5s var(--ease) forwards;
    pointer-events:none; text-align:center;
    text-indent:clamp(8px,4vw,25px);
}
.click-to-enter {
    position:absolute; bottom:10%;
    font-size:10px; letter-spacing:4px; opacity:0.4; animation:pulse 2s infinite;
}
@keyframes introReveal {
    0%   { opacity:0; transform:translateY(20px) scale(0.95); filter:blur(10px); }
    100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}
@keyframes pulse { 0%,100%{opacity:0.2;} 50%{opacity:0.5;} }
body.is-started #intro-screen { opacity:0; visibility:hidden; }

nav {
    position:fixed; top:0; width:100%;
    display:flex; justify-content:space-between; align-items:center;
    z-index:4000; pointer-events:none;
}
.logo { letter-spacing:5px; font-size:14px; text-transform:uppercase; transition:opacity 0.5s var(--ease); }
.contact-trigger { font-size:12px; letter-spacing:2px; border-bottom:1px solid #fff; pointer-events:auto; cursor:pointer !important; }
body:not(.is-started) nav { opacity:0; }
body.is-started nav { opacity:1; transition:opacity 1s var(--ease) 0.5s; }

#contact-overlay {
    position:fixed; inset:0;
    background:rgba(10,10,10,0.85);
    backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px);
    z-index:7000; display:flex; flex-direction:column; justify-content:center; align-items:center;
    opacity:0; visibility:hidden; transition:all 0.6s var(--ease);
    cursor:pointer !important;
}
#contact-overlay.active { opacity:1; visibility:visible; }
.contact-list { list-style:none; text-align:center; pointer-events:auto; }
.contact-item { margin:20px 0; overflow:hidden; }
.contact-link {
    font-size:18px; font-weight:300; text-transform:uppercase; letter-spacing:6px;
    color:rgba(255,255,255,0.5); text-decoration:none; display:inline-block;
    transition:color 0.4s var(--ease); cursor:pointer !important; position:relative; padding:8px 0;
}
.contact-link:hover { color:#fff; }
.contact-link::after {
    content:''; position:absolute; bottom:0; left:0;
    width:0; height:1px; background:#fff; transition:width 0.4s var(--ease);
}
.contact-link:hover::after { width:100%; }

#toast {
    position:fixed; bottom:50px; left:50%; transform:translateX(-50%);
    background:#fff; color:#000; padding:12px 24px;
    font-size:11px; font-weight:600; letter-spacing:2px; border-radius:2px;
    opacity:0; transition:opacity 0.4s var(--ease); z-index:8000; pointer-events:none;
}

.anim-wrap { position:absolute; inset:0; width:100%; height:100%; overflow:hidden; }
.anim-still, .anim-live {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; display:block; pointer-events:none;
}
.anim-live  { opacity:0; transition:opacity 0.25s ease; }
.anim-still { opacity:1; transition:opacity 0.25s ease; }
.anim-wrap.playing .anim-live  { opacity:1; }
.anim-wrap.playing .anim-still { opacity:0; }

.photo-img-wrap {
    position:absolute; width:100%; height:100%; inset:0;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.photo-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }

@media (orientation: landscape) {
    nav { padding:40px 60px; }

    .close-project {
        position:fixed; top:40px; left:60px; z-index:6000; display:none;
        font-size:12px; letter-spacing:2px; text-transform:uppercase; cursor:pointer !important;
    }
    body.is-detail .close-project { display:block; }
    body.is-detail .logo { opacity:0; pointer-events:none; }

    #detail-pagers {
        position:fixed; top:110px; left:50%; transform:translateX(-50%);
        display:flex; gap:8px; z-index:3500; opacity:0; visibility:hidden;
        transition:all 0.8s var(--ease); padding:8px; border-radius:8px;
        max-width:90vw; flex-wrap:wrap; justify-content:center;
    }
    body.is-detail #detail-pagers { opacity:1; visibility:visible; }
    .pager-item {
        width:70px; height:50px; border-radius:4px; background-size:cover; background-position:center;
        opacity:0.3; transition:all 0.4s var(--ease); cursor:pointer !important;
        border:1px solid rgba(255,255,255,0.2); background-color:#333;
        overflow:hidden; position:relative;
    }
    .pager-item:hover { opacity:0.7; }
    .pager-item.active { opacity:1; border-color:#fff; transform:scale(1.1); }
    .pager-item img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }

    #stage {
        position:relative; display:flex; width:100vw; height:100vh;
        justify-content:center; align-items:center; perspective:2000px; overflow:hidden;
        transition:padding-top var(--transition), filter 1.5s var(--ease), background-color var(--transition);
        user-select:none;
    }
    body:not(.is-started) #stage { filter:blur(20px) scale(1.1); }
    body.is-detail #stage { background-color:rgba(0,0,0,0.7); }
    #stage.is-dragging, #stage.is-dragging * { cursor:grabbing !important; }

    .project-strip {
        position:absolute; top:50%; transform:translate(-50%,-50%);
        border-radius:var(--radius); z-index:10;
        display:flex; align-items:center; justify-content:center;
        opacity:0.4; background-color:transparent;
        transition:width var(--transition), height var(--transition),
                   transform var(--transition), left var(--transition), opacity 0.4s ease, z-index 0s;
        will-change:transform, width, height, left; cursor:pointer !important; overflow:hidden;
    }
    body:not(.is-detail) .project-strip:not(.expanded):not(.peek):hover {
        opacity:1 !important;
        transition:opacity 0.25s ease, width var(--transition), height var(--transition),
                   transform var(--transition), left var(--transition), z-index 0s;
    }
    body:not(.is-detail) .project-strip:not(.expanded):not(.peek):hover .strip-img-wrapper
        { transform:scale(1.07); transition:transform 0.5s var(--ease); }
    body:not(.is-detail) .project-strip:not(.expanded):not(.peek):hover .thumb-title
        { opacity:1; transition:opacity 0.25s ease; }
    .project-strip.peek:hover {
        opacity:0.6 !important;
        transition:width var(--transition), height var(--transition),
                   transform var(--transition), left var(--transition), opacity 0.3s ease, z-index 0s !important;
    }

    .strip-img-wrapper {
        width:100%; height:100%; position:absolute; border-radius:var(--radius);
        overflow:hidden; z-index:1; background-color:transparent;
        transition:transform 0.5s var(--ease); background-size:cover; background-position:center;
    }
    .project-strip.expanded .strip-img-wrapper { background-color:#000; }

    .detail-photos {
        position:absolute; width:100%; height:100%;
        opacity:0; transition:opacity 0.6s var(--ease); z-index:2;
    }
    .expanded .detail-photos { opacity:1; }

    .photo {
        position:absolute; inset:0; width:100%; height:100%;
        opacity:0; z-index:0;
        transition:opacity 0.6s var(--ease), z-index 0s 0.6s;
        background-size:cover; background-repeat:no-repeat; background-position:center;
    }
    .photo.active { opacity:1; z-index:1; transition:opacity 0.6s var(--ease), z-index 0s 0s; }

    .photo-nav {
        position:absolute; top:50%; transform:translateY(-50%);
        background:none; color:rgba(255,255,255,0.3); font-size:54px; font-weight:200;
        z-index:10; opacity:0; visibility:hidden; transition:opacity 0.3s var(--ease);
        cursor:default !important; user-select:none; outline:none;
    }
    .project-strip.expanded .photo-nav { opacity:1; visibility:visible; }
    .photo-nav-prev { left:30px; }
    .photo-nav-next { right:30px; }

    .thumb-title {
        position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-90deg);
        font-size:11px; font-weight:300; letter-spacing:5px; opacity:0.6; z-index:10;
        text-transform:uppercase; white-space:nowrap; transition:opacity 0.4s;
    }
    .project-strip.expanded .thumb-title { opacity:0; }

    #fixed-expanded-title {
        position:fixed; top:calc(100vh - 160px); left:50%; transform:translateX(-50%);
        z-index:4000; opacity:0; transition:opacity 0.8s var(--ease) 0.3s;
    }
    body.is-detail #fixed-expanded-title { opacity:1; }
    .expanded-title { font-size:16px; font-weight:400; letter-spacing:10px; color:#fff; text-transform:uppercase; line-height:1; }

    #mobile-layout { display:none !important; }
}

@media (orientation: portrait) {
    nav { height:var(--nav-h-mob); padding:0 24px; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-size:12px; letter-spacing:3px; transition:opacity 0.45s var(--ease), transform 0.45s var(--ease); transform-origin:left center; }
    .contact-trigger { font-size:11px; letter-spacing:2px; }

    .close-project {
        position:fixed; left:24px; top:0; height:var(--nav-h-mob);
        display:flex; align-items:center; z-index:6000;
        font-size:12px; letter-spacing:2px; text-transform:uppercase;
        opacity:0; pointer-events:none; transition:opacity 0.45s var(--ease); cursor:pointer !important;
    }
    body.is-detail .close-project { opacity:1; pointer-events:auto; }
    body.is-detail .logo { opacity:0; pointer-events:none; transform:translateX(-6px) scale(0.95); }
    body.is-detail nav { pointer-events:none; }
    body.is-detail .contact-trigger { pointer-events:auto; }

    #mob-detail-nav-border {
        position:fixed; top:0; left:0; right:0; height:var(--nav-h-mob);
        background:linear-gradient(to bottom, hsl(0,0%,18%) 0%, hsl(0,0%,18%) 75%, transparent 100%);
        pointer-events:none; z-index:3800; opacity:0; visibility:hidden;
        transition:opacity 0.5s var(--ease), visibility 0.5s;
    }
    body.is-detail #mob-detail-nav-border { opacity:1; visibility:visible; }

    #stage, #fixed-expanded-title, #detail-pagers { display:none !important; }

    #mobile-layout { display:block; width:100vw; height:100vh; position:relative; }

    #mob-grid-wrap {
        position:absolute; inset:0; overflow-y:auto; overflow-x:hidden;
        scrollbar-width:none; -ms-overflow-style:none;
        transition:opacity 0.5s var(--ease), visibility 0.5s;
    }
    #mob-grid-wrap::-webkit-scrollbar { display:none; }
    body.is-detail #mob-grid-wrap { opacity:0; visibility:hidden; pointer-events:none; }
    body:not(.is-started) #mob-grid-wrap { filter:blur(16px); }

    #mob-nav-border {
        position:fixed; top:0; left:0; right:0; height:var(--nav-h-mob);
        background:linear-gradient(to bottom, hsl(0,0%,18%) 0%, hsl(0,0%,18%) 75%, transparent 100%);
        pointer-events:none; z-index:3500; transition:opacity 0.5s var(--ease);
    }
    body.is-detail #mob-nav-border { opacity:0; visibility:hidden; }

    #mob-grid { display:flex; flex-direction:column; gap:14px; padding:var(--nav-h-mob) 20px 48px; }

    .mob-card {
        position:relative; width:100%; aspect-ratio:16/10;
        border-radius:var(--radius); overflow:hidden; cursor:pointer !important; opacity:0.72;
        transition:opacity 0.3s var(--ease), transform 0.3s var(--ease);
    }
    .mob-card:active { opacity:1; transform:scale(0.985); }
    .mob-card-bg { position:absolute; inset:0; background-size:cover; background-position:center; transition:transform 0.55s var(--ease); }
    .mob-card-bg img { width:100%; height:100%; object-fit:cover; display:block; }
    .mob-card:active .mob-card-bg { transform:scale(1.04); }
    .mob-card-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 55%); }
    .mob-card-title { position:absolute; bottom:16px; left:18px; font-size:11px; font-weight:300; letter-spacing:5px; text-transform:uppercase; color:#fff; opacity:0.85; }

    #mob-detail {
        position:absolute; inset:0; background:var(--bg); z-index:2000;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:20px; opacity:0; visibility:hidden;
        transition:opacity 0.7s var(--ease), visibility 0.7s;
        pointer-events:none; overflow:hidden;
    }
    body.is-detail #mob-detail { opacity:1; visibility:visible; pointer-events:auto; }

    .mob-peek-card {
        width:calc(100% - 80px); aspect-ratio:16/9; border-radius:var(--radius);
        overflow:hidden; flex-shrink:0; position:relative; opacity:0.25; cursor:pointer !important;
        background-size:cover; background-position:center;
        transition:opacity 0.6s var(--ease), transform 0.6s var(--ease);
    }
    .mob-peek-card:active { opacity:0.5; }
    #mob-peek-top    { transform:scale(0.88); transform-origin:bottom center; }
    #mob-peek-bottom { transform:scale(0.88); transform-origin:top center; }
    .mob-peek-label {
        position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
        font-size:9px; font-weight:300; letter-spacing:4px; text-transform:uppercase;
        color:rgba(255,255,255,0.55); background:rgba(0,0,0,0.5); pointer-events:none; z-index:2;
    }

    #mob-main-block { display:flex; flex-direction:column; align-items:center; gap:14px; width:100%; flex-shrink:0; }

    #mob-viewer {
        position:relative; width:calc(100% - 48px); aspect-ratio:16/9;
        border-radius:var(--radius); overflow:hidden; flex-shrink:0;
        z-index:2; box-shadow:0 16px 48px rgba(0,0,0,0.55);
    }

    .mob-slide {
        position:absolute; inset:0; background-size:cover; background-position:center;
        opacity:0; transition:opacity 0.65s var(--ease); pointer-events:none;
    }
    .mob-slide.active { opacity:1; pointer-events:auto; }
    .mob-slide img { width:100%; height:100%; object-fit:cover; display:block; }

    .mob-tap-zone { position:absolute; top:0; bottom:0; width:50%; z-index:5; cursor:pointer !important; }
    #mob-tap-prev { left:0; }
    #mob-tap-next { right:0; }

    .mob-tap-hint {
        position:absolute; top:50%; transform:translateY(-50%);
        font-size:28px; font-weight:200; color:rgba(255,255,255,0.2);
        pointer-events:none; z-index:4; animation:hintFade 3s var(--ease) 0.8s forwards;
    }
    #mob-hint-prev { left:12px; }
    #mob-hint-next { right:12px; }
    @keyframes hintFade { 0%,70%{opacity:1;} 100%{opacity:0;} }

    #mob-info-bar { width:calc(100% - 48px); display:flex; flex-direction:column; align-items:center; gap:10px; flex-shrink:0; }
    #mob-detail-title { font-size:11px; font-weight:300; letter-spacing:8px; text-transform:uppercase; color:rgba(255,255,255,0.55); text-align:center; }

    #mob-thumbs {
        display:flex; gap:6px; flex-wrap:nowrap; width:100%; max-width:100%;
        overflow-x:auto; overflow-y:visible; overscroll-behavior-x:contain;
        scrollbar-width:none; -ms-overflow-style:none;
        padding:2px 2px 4px; box-sizing:border-box; justify-content:center;
    }
    #mob-thumbs::-webkit-scrollbar { display:none; }

    .mob-thumb {
        width:44px; height:30px; border-radius:4px; flex-shrink:0;
        background-size:cover; background-position:center; opacity:0.3;
        border:1px solid rgba(255,255,255,0.1); overflow:hidden;
        transition:opacity 0.3s var(--ease), border-color 0.3s, transform 0.3s var(--ease);
        cursor:pointer !important; position:relative;
    }
    .mob-thumb img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
    .mob-thumb.active { opacity:1; border-color:#fff; transform:scale(1.1); }

    .contact-link { font-size:15px; letter-spacing:5px; }
}

    </style>
</head>

<div id="intro-screen">
    <div class="intro-logo">Surfercho</div>
    <div class="click-to-enter">CLICK ANYWHERE TO ENTER</div>
</div>

<nav>
    <div class="logo">Surfercho</div>
    <div class="contact-trigger" onclick="event.stopPropagation(); toggleContact();">CONTACT</div>
</nav>

<div id="contact-overlay" onclick="toggleContact()">
    <ul class="contact-list" onclick="event.stopPropagation()">
        <li class="contact-item"><a class="contact-link" onclick="copyEmail('surfercho3@gmail.com')">Gmail</a></li>
        <li class="contact-item"><a href="https://www.linkedin.com/in/surfer-cho-8a46893b8/" target="_blank" class="contact-link">LinkedIn</a></li>
        <li class="contact-item"><a href="https://www.behance.net/chosurfer" target="_blank" class="contact-link">Behance</a></li>
        <li class="contact-item"><a href="https://www.instagram.com/surfercho/" target="_blank" class="contact-link">Instagram</a></li>
    </ul>
</div>

<div id="toast">EMAIL COPIED</div>

<div id="detail-pagers"></div>
<div id="fixed-expanded-title"><div class="expanded-title"></div></div>
<div id="stage"></div>

<div id="mob-detail-nav-border"></div>

<div id="mobile-layout">
    <div id="mob-nav-border"></div>
    <div id="mob-grid-wrap"><div id="mob-grid"></div></div>
    <div id="mob-detail">
        <div class="mob-peek-card" id="mob-peek-top" onclick="event.stopPropagation(); mobSwitchProject(-1)">
            <div class="mob-peek-label" id="mob-peek-top-label"></div>
        </div>
        <div id="mob-main-block">
            <div id="mob-viewer">
                <span class="mob-tap-hint" id="mob-hint-prev">&#10216;</span>
                <span class="mob-tap-hint" id="mob-hint-next">&#10217;</span>
                <div class="mob-tap-zone" id="mob-tap-prev"></div>
                <div class="mob-tap-zone" id="mob-tap-next"></div>
            </div>
            <div id="mob-info-bar">
                <div id="mob-detail-title"></div>
                <div id="mob-thumbs"></div>
            </div>
        </div>
        <div class="mob-peek-card" id="mob-peek-bottom" onclick="event.stopPropagation(); mobSwitchProject(1)">
            <div class="mob-peek-label" id="mob-peek-bottom-label"></div>
        </div>
    </div>
</div>

<script>
const TITLES = ['LUGIA','B-Project','C-Project','D-Project','E-Project',
                'F-Project','G-Project','H-Project','I-Project','J-Project'];
const LABELS = ['a','b','c','d','e','f','g','h','i','j'];

const IMAGES = TITLES.map((_, i) => {
    const lbl = LABELS[i];
    if (i === 0) {
        return Array.from({length:7}, (_, p) =>
            p === 0 ? `assets/project-${lbl}/${lbl} (1).webp`
                    : `assets/project-${lbl}/${lbl} (${p+1}).png`
        );
    }
    return Array.from({length:10}, (_, p) =>
        `https://picsum.photos/seed/proj-${i}-${p}/1600/900`
    );
});

function isAnimated(projIdx, photoIdx) { return projIdx === 0 && photoIdx === 0; }

const STILL_CACHE = {};

function extractFirstFrame(url) {
    return new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            try {
                const c = document.createElement('canvas');
                c.width = img.naturalWidth || 1600;
                c.height = img.naturalHeight || 900;
                c.getContext('2d').drawImage(img, 0, 0);
                resolve(c.toDataURL('image/png'));
            } catch(e) { resolve(null); }
        };
        img.onerror = () => resolve(null);
        img.src = url;
    });
}

function makeAnimWrap(projIdx, extraStyle) {
    const animUrl = IMAGES[projIdx][0];
    const stillSrc = STILL_CACHE[projIdx] || animUrl;
    const div = document.createElement('div');
    div.className = 'anim-wrap';
    if (extraStyle) div.style.cssText = extraStyle;
    div.dataset.proj = projIdx;
    div.innerHTML = `
        <img class="anim-still" src="${stillSrc}" alt="" draggable="false">
        <img class="anim-live"  src=""            alt="" draggable="false" data-anim="${animUrl}">`;
    return div;
}

function animPlay(wrap) {
    if (!wrap || wrap.classList.contains('playing')) return;
    const live = wrap.querySelector('.anim-live');
    if (live && !live.src) live.src = live.dataset.anim;
    wrap.classList.add('playing');
}

function animStop(wrap) {
    if (!wrap) return;
    wrap.classList.remove('playing');
    const live = wrap.querySelector('.anim-live');
    if (live) live.src = '';
}

function updateStills(projIdx, dataUrl) {
    document.querySelectorAll(`.anim-wrap[data-proj="${projIdx}"]`).forEach(wrap => {
        const still = wrap.querySelector('.anim-still');
        if (still && !wrap.classList.contains('playing')) still.src = dataUrl;
    });
}

(function preloadStills() {
    TITLES.forEach((_, i) => {
        if (!isAnimated(i, 0)) return;
        extractFirstFrame(IMAGES[i][0]).then(dataUrl => {
            if (!dataUrl) return;
            STILL_CACHE[i] = dataUrl;
            updateStills(i, dataUrl);
        });
    });
})();

function makePhotoEl(projIdx, photoIdx, extraClass) {
    const url = IMAGES[projIdx][photoIdx];
    const cls = `photo${extraClass ? ' '+extraClass : ''}`;
    if (isAnimated(projIdx, photoIdx)) {
        const div = document.createElement('div');
        div.className = cls;
        div.dataset.animated = 'true';
        div.appendChild(makeAnimWrap(projIdx, 'position:absolute;inset:0;'));
        return div;
    }
    return `<div class="${cls}" style="background-image:url('${url}')"></div>`;
}

function makeThumbEl(projIdx, photoIdx, activeClass, onclick) {
    const url = IMAGES[projIdx][photoIdx];
    const div = document.createElement('div');
    div.className = `mob-thumb${activeClass ? ' '+activeClass : ''}`;
    div.onclick = onclick;
    if (isAnimated(projIdx, photoIdx)) {
        div.appendChild(makeAnimWrap(projIdx, 'position:absolute;inset:0;'));
    } else {
        div.style.backgroundImage = `url('${url}')`;
    }
    return div;
}

function makePagerEl(projIdx, photoIdx, activeClass, onclick) {
    const url = IMAGES[projIdx][photoIdx];
    const div = document.createElement('div');
    div.className = `pager-item${activeClass ? ' '+activeClass : ''}`;
    div.onclick = onclick;
    if (isAnimated(projIdx, photoIdx)) {
        div.appendChild(makeAnimWrap(projIdx, 'position:absolute;inset:0;'));
    } else {
        div.style.backgroundImage = `url('${url}')`;
    }
    return div;
}

const body        = document.body;
const isLandscape = () => window.innerWidth > window.innerHeight;
const isMobile    = () => !isLandscape();

window.addEventListener('resize', () => {
    if (body.classList.contains('is-detail')) body.classList.remove('is-detail');
});

function handleIntroClick() {
    if (!body.classList.contains('is-started')) body.classList.add('is-started');
}
function toggleContact() {
    document.getElementById('contact-overlay').classList.toggle('active');
}
function copyEmail(email) {
    navigator.clipboard.writeText(email).then(() => {
        const t = document.getElementById('toast');
        t.style.opacity = '1';
        setTimeout(() => { t.style.opacity = '0'; }, 2000);
    });
}
function shrinkProject() {
    if (isMobile()) mobShrink(); else pcShrink();
}

(function pcInit() {
    const stage          = document.getElementById('stage');
    const pagerContainer = document.getElementById('detail-pagers');
    const expandedTitle  = document.querySelector('.expanded-title');
    let currentIndex = -1;

    const STRIP_W   = 195;
    const STRIP_GAP = 215;

    let scrollOffsetX = 0, overX = 0, velX = 0;
    let dragActive = false, dragStartX = 0, dragStartOff = 0;
    let dragMoved = false, lastPointerX = 0, rafId = null, isTouchDrag = false;

    const FRICTION = 0.88, SPRING_STIFF = 0.16, SPRING_DAMP = 0.68;
    const MAX_OVER = 110, RESIST = 0.26, DRAG_THRESHOLD = 6;

    function maxOffset() {
        const totalW = (TITLES.length - 1) * STRIP_GAP + STRIP_W;
        return Math.max(0, (totalW + STRIP_W + 80 - window.innerWidth) / 2);
    }
    function baseLeft(i) {
        return window.innerWidth / 2 + (i - (TITLES.length - 1) / 2) * STRIP_GAP;
    }
    function applyScroll() {
        if (body.classList.contains('is-detail')) return;
        strips.forEach((s, i) => {
            if (s.classList.contains('expanded') || s.classList.contains('peek')) return;
            s.style.transition = 'none';
            s.style.left = `${baseLeft(i) - (scrollOffsetX + overX)}px`;
        });
    }

    stage.innerHTML = '';
    TITLES.forEach((t, i) => {
        const strip = document.createElement('div');
        strip.className = `project-strip strip-${i}`;
        strip.dataset.index = i;

        const titleEl = document.createElement('div');
        titleEl.className = 'thumb-title';
        titleEl.textContent = t;
        strip.appendChild(titleEl);

        const wrapper = document.createElement('div');
        wrapper.className = 'strip-img-wrapper';
        if (!isAnimated(i, 0)) wrapper.style.backgroundImage = `url('${IMAGES[i][0]}')`;
        strip.appendChild(wrapper);

        if (isAnimated(i, 0)) wrapper.appendChild(makeAnimWrap(i, 'position:absolute;inset:0;z-index:0;'));

        const navPrev = document.createElement('div');
        navPrev.className = 'photo-nav photo-nav-prev';
        navPrev.innerHTML = '&#10216;';
        navPrev.onclick = e => { e.stopPropagation(); pcNav(i, -1); };
        wrapper.appendChild(navPrev);

        const navNext = document.createElement('div');
        navNext.className = 'photo-nav photo-nav-next';
        navNext.innerHTML = '&#10217;';
        navNext.onclick = e => { e.stopPropagation(); pcNav(i, 1); };
        wrapper.appendChild(navNext);

        const detailPhotos = document.createElement('div');
        detailPhotos.className = 'detail-photos';
        IMAGES[i].forEach((url, p) => {
            const el = makePhotoEl(i, p, p === 0 ? 'active' : '');
            if (typeof el === 'string') detailPhotos.insertAdjacentHTML('beforeend', el);
            else detailPhotos.appendChild(el);
        });
        wrapper.appendChild(detailPhotos);

        stage.appendChild(strip);
    });

    const strips = document.querySelectorAll('.project-strip');
    layoutDefault();

    function startDrag(clientX, isTouch) {
        if (body.classList.contains('is-detail')) return false;
        isTouchDrag = isTouch;
        dragActive = true; dragMoved = false;
        dragStartX = clientX; dragStartOff = scrollOffsetX;
        lastPointerX = clientX; velX = 0; overX = 0;
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        if (!isTouch) stage.classList.add('is-dragging');
        return true;
    }

    function moveDrag(clientX) {
        if (!dragActive) return;
        velX = lastPointerX - clientX;
        lastPointerX = clientX;
        if (Math.abs(clientX - dragStartX) > DRAG_THRESHOLD) dragMoved = true;
        const raw = dragStartOff + (dragStartX - clientX);
        const max = maxOffset();
        if      (raw < 0)   { scrollOffsetX = 0;   overX = Math.max(-MAX_OVER, raw * RESIST); }
        else if (raw > max) { scrollOffsetX = max;  overX = Math.min(MAX_OVER, (raw - max) * RESIST); }
        else                { scrollOffsetX = raw;  overX = 0; }
        applyScroll();
    }

    function endDrag(tapX, tapY) {
        if (!dragActive) return;
        const wasMoved = dragMoved;
        dragActive = false;
        if (!isTouchDrag) stage.classList.remove('is-dragging');

        if (!wasMoved) {
            overX = 0;
            if (tapX !== undefined) {
                const el = document.elementFromPoint(tapX, tapY);
                const strip = el && el.closest('.project-strip');
                if (strip) {
                    const idx = parseInt(strip.dataset.index);
                    if (strip.classList.contains('expanded')) {
                        const r = strip.getBoundingClientRect();
                        rotate(strip, tapX - r.left < r.width / 2 ? -1 : 1);
                    } else {
                        showProject(idx);
                    }
                }
            }
            return;
        }

        (function loop() {
            let active = false;
            const max = maxOffset();
            if (Math.abs(velX) > 0.25) {
                scrollOffsetX = Math.max(0, Math.min(max, scrollOffsetX + velX));
                velX *= FRICTION; active = true;
            } else velX = 0;
            if (scrollOffsetX < 0) { overX += -scrollOffsetX * RESIST; scrollOffsetX = 0; velX *= -0.25; active = true; }
            else if (scrollOffsetX > max) { overX += (scrollOffsetX - max) * RESIST; scrollOffsetX = max; velX *= -0.25; active = true; }
            if (Math.abs(overX) > 0.15) { overX -= overX * SPRING_STIFF * 5; overX *= SPRING_DAMP; active = true; } else overX = 0;
            applyScroll();
            if (active) rafId = requestAnimationFrame(loop);
        })();
    }

    stage.addEventListener('mousedown', e => { if (isMobile()) return; if (startDrag(e.clientX, false)) e.preventDefault(); });
    window.addEventListener('mousemove', e => { if (!isTouchDrag) moveDrag(e.clientX); });
    window.addEventListener('mouseup',   () => { if (!isTouchDrag) endDrag(); });
    window.addEventListener('mouseleave', () => { if (dragActive && !isTouchDrag) { dragActive = false; stage.classList.remove('is-dragging'); } });

    stage.addEventListener('touchstart', e => { if (!body.classList.contains('is-detail')) startDrag(e.touches[0].clientX, true); }, { passive:true });
    stage.addEventListener('touchmove',  e => { if (dragActive && isTouchDrag) moveDrag(e.touches[0].clientX); }, { passive:true });
    stage.addEventListener('touchend',   e => { if (dragActive && isTouchDrag) { const t = e.changedTouches[0]; endDrag(t.clientX, t.clientY); } });

    strips.forEach(s => s.addEventListener('click', function(e) {
        if (!body.classList.contains('is-started') || isMobile() || isTouchDrag || dragMoved) return;
        const idx = parseInt(this.dataset.index);
        if (this.classList.contains('expanded')) {
            const r = this.getBoundingClientRect();
            rotate(this, e.clientX - r.left < r.width / 2 ? -1 : 1);
        } else { showProject(idx); }
    }));

    function layoutDefault() {
        strips.forEach((s, i) => {
            s.style.left = `${baseLeft(i) - scrollOffsetX}px`;
            s.style.top = '50%'; s.style.width = `${STRIP_W}px`;
            s.style.height = 'var(--strip-height)'; s.style.transform = 'translate(-50%,-50%)';
            s.style.opacity = '0.4'; s.style.zIndex = '10'; s.style.pointerEvents = 'auto';
            s.classList.remove('expanded','peek');
        });
    }

    function layoutDetail() {
        const n = TITLES.length;
        strips.forEach((s, i) => {
            s.style.top = '50%';
            if (i === currentIndex) {
                s.style.left='50vw'; s.style.width='calc(var(--strip-height)*16/9)';
                s.style.height='var(--strip-height)'; s.style.transform='translate(-50%,-50%)';
                s.style.opacity='1'; s.style.zIndex='3000'; s.style.pointerEvents='auto';
                s.classList.add('expanded'); s.classList.remove('peek');
            } else if (i === (currentIndex-1+n)%n) {
                s.style.left='10vw'; s.style.width='12vw'; s.style.height='var(--strip-height)';
                s.style.transform='translate(-50%,-50%) rotateY(15deg) scale(1.023)';
                s.style.opacity='0.25'; s.style.zIndex='1500'; s.style.pointerEvents='auto';
                s.classList.add('peek'); s.classList.remove('expanded');
            } else if (i === (currentIndex+1)%n) {
                s.style.left='90vw'; s.style.width='12vw'; s.style.height='var(--strip-height)';
                s.style.transform='translate(-50%,-50%) rotateY(-15deg) scale(1.023)';
                s.style.opacity='0.25'; s.style.zIndex='1500'; s.style.pointerEvents='auto';
                s.classList.add('peek'); s.classList.remove('expanded');
            } else {
                const offL = i===(currentIndex-2+n)%n?'-20vw':i===(currentIndex+2)%n?'120vw':'50vw';
                s.style.left=offL; s.style.width='12vw'; s.style.height='var(--strip-height)';
                s.style.transform='translate(-50%,-50%) scale(0.5)';
                s.style.opacity='0'; s.style.zIndex='1000'; s.style.pointerEvents='none';
                s.classList.remove('expanded','peek');
            }
        });
    }

    function showProject(index) {
        const entering = !body.classList.contains('is-detail');
        currentIndex = index;
        if (expandedTitle) expandedTitle.innerText = TITLES[index];
        if (entering) body.classList.add('is-detail');

        strips[index].querySelectorAll('.strip-img-wrapper > .anim-wrap').forEach(animStop);
        strips[index].querySelectorAll('.photo').forEach((p,i) => {
            p.classList.toggle('active', i===0);
            const aw = p.querySelector('.anim-wrap');
            if (aw) { if (i===0) animPlay(aw); else animStop(aw); }
        });

        pagerContainer.innerHTML = '';
        IMAGES[index].forEach((url, pIdx) => {
            pagerContainer.appendChild(
                makePagerEl(index, pIdx, pIdx===0?'active':'', e => { e.stopPropagation(); pcJump(index, pIdx); })
            );
        });

        if (entering) {
            strips.forEach((s, i) => {
                if (i === index) {
                    s.style.left='50vw'; s.style.width='calc(var(--strip-height)*16/9)';
                    s.style.height='var(--strip-height)'; s.style.transform='translate(-50%,-50%)';
                    s.style.opacity='1'; s.style.zIndex='3000'; s.style.pointerEvents='auto';
                    s.classList.add('expanded'); s.classList.remove('peek');
                } else {
                    s.style.transition='opacity 0.6s var(--ease)';
                    s.style.opacity='0'; s.style.pointerEvents='none';
                }
            });
            setTimeout(() => { strips.forEach(s => { s.style.transition=''; }); layoutDetail(); }, 600);
        } else { layoutDetail(); }
    }

    window.pcNav = (idx, dir) => rotate(strips[idx], dir);
    window.pcJump = (projIdx, photoIdx) => {
        const photos = strips[projIdx].querySelectorAll('.photo');
        const pagers = pagerContainer.querySelectorAll('.pager-item');
        photos.forEach((p,i) => {
            p.classList.toggle('active', i===photoIdx);
            const aw = p.querySelector('.anim-wrap');
            if (aw) { if (i===photoIdx) animPlay(aw); else animStop(aw); }
        });
        pagers.forEach((pg,i) => pg.classList.toggle('active', i===photoIdx));
    };

    function rotate(strip, dir) {
        const photos = strip.querySelectorAll('.photo');
        const pagers = pagerContainer.querySelectorAll('.pager-item');
        if (!pagers.length) return;
        let idx = Array.from(photos).findIndex(p => p.classList.contains('active'));
        const aw0 = photos[idx].querySelector('.anim-wrap');
        if (aw0) animStop(aw0);
        photos[idx].classList.remove('active');
        if (pagers[idx]) pagers[idx].classList.remove('active');
        idx = (idx + dir + photos.length) % photos.length;
        photos[idx].classList.add('active');
        if (pagers[idx]) pagers[idx].classList.add('active');
        const aw1 = photos[idx].querySelector('.anim-wrap');
        if (aw1) animPlay(aw1);
    }

    window.pcShrink = function() {
        body.classList.remove('is-detail');
        const old = currentIndex; currentIndex = -1;

        strips[old].querySelectorAll('.anim-wrap').forEach(animStop);
        strips[old].style.transition='';
        strips[old].style.left=`${baseLeft(old)-scrollOffsetX}px`;
        strips[old].style.width=`${STRIP_W}px`; strips[old].style.height='var(--strip-height)';
        strips[old].style.transform='translate(-50%,-50%)'; strips[old].style.opacity='0.4';
        strips[old].style.zIndex='10'; strips[old].style.pointerEvents='auto';
        strips[old].classList.remove('expanded','peek');

        const others = [];
        strips.forEach((s, i) => {
            if (i===old) return;
            s.style.transition='none'; s.style.left=`${baseLeft(i)-scrollOffsetX}px`;
            s.style.width=`${STRIP_W}px`; s.style.height='var(--strip-height)';
            s.style.zIndex='10'; s.style.opacity='0';
            s.style.top = Math.random()>0.5?'calc(50% - 100px)':'calc(50% + 100px)';
            s.style.transform='translate(-50%,-50%)'; s.style.pointerEvents='none';
            s.classList.remove('expanded','peek'); others.push(s);
        });
        for(let i=others.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[others[i],others[j]]=[others[j],others[i]];}
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
            others.forEach((s, oi) => {
                const delay = (oi*(1.0/(others.length-1))).toFixed(2);
                s.style.transition=`top 0.5s var(--ease) ${delay}s, opacity 0.5s var(--ease) ${delay}s`;
                s.style.top='50%'; s.style.opacity='0.4'; s.style.pointerEvents='auto';
                setTimeout(()=>{ s.style.transition=''; }, (parseFloat(delay)+0.5)*1000+100);
            });
        }));

        pagerContainer.innerHTML='';
        document.querySelectorAll('.photo').forEach(p => {
            p.classList.toggle('active', p === p.parentElement.querySelector('.photo'));
            const aw = p.querySelector('.anim-wrap');
            if (aw) animStop(aw);
        });
    };
})();

(function mobInit() {
    const grid       = document.getElementById('mob-grid');
    const viewer     = document.getElementById('mob-viewer');
    const mainBlock  = document.getElementById('mob-main-block');
    const thumbsEl   = document.getElementById('mob-thumbs');
    const titleEl    = document.getElementById('mob-detail-title');
    const tapPrev    = document.getElementById('mob-tap-prev');
    const tapNext    = document.getElementById('mob-tap-next');
    const peekTop    = document.getElementById('mob-peek-top');
    const peekBot    = document.getElementById('mob-peek-bottom');
    const peekTopLbl = document.getElementById('mob-peek-top-label');
    const peekBotLbl = document.getElementById('mob-peek-bottom-label');
    const EASE='cubic-bezier(0.23, 1, 0.32, 1)', DUR=750;
    let curProject=-1, curPhoto=0, switching=false;

    TITLES.forEach((t, i) => {
        const card = document.createElement('div');
        card.className = 'mob-card';

        const bgDiv = document.createElement('div');
        bgDiv.className = 'mob-card-bg';
        if (isAnimated(i, 0)) {
            bgDiv.appendChild(makeAnimWrap(i, 'position:absolute;inset:0;'));
        } else {
            bgDiv.style.backgroundImage = `url('${IMAGES[i][0]}')`;
        }

        const overlay = document.createElement('div');
        overlay.className = 'mob-card-overlay';
        const titleDiv = document.createElement('div');
        titleDiv.className = 'mob-card-title';
        titleDiv.textContent = t;

        card.appendChild(bgDiv);
        card.appendChild(overlay);
        card.appendChild(titleDiv);
        card.addEventListener('click', () => {
            if (!body.classList.contains('is-started') || !isMobile()) return;
            showProject(i);
        });
        grid.appendChild(card);
    });

    tapPrev.addEventListener('click', () => rotatePhoto(-1));
    tapNext.addEventListener('click', () => rotatePhoto(1));

    function setPeekBg(el, projIdx) {
        el.querySelectorAll('.anim-wrap').forEach(w => w.remove());
        if (isAnimated(projIdx, 0)) {
            const aw = makeAnimWrap(projIdx, 'position:absolute;inset:0;z-index:0;');
            el.insertBefore(aw, el.firstChild);
            animStop(aw);
        } else {
            el.style.backgroundImage = `url('${IMAGES[projIdx][0]}')`;
        }
    }

    function updatePeek(index) {
        const n=TITLES.length, prev=(index-1+n)%n, next=(index+1)%n;
        setPeekBg(peekTop, prev); setPeekBg(peekBot, next);
        peekTopLbl.textContent=TITLES[prev]; peekBotLbl.textContent=TITLES[next];
    }

    function loadContent(index) {
        titleEl.textContent = TITLES[index];

        viewer.querySelectorAll('.mob-slide').forEach(el => el.remove());
        IMAGES[index].forEach((url, p) => {
            const s = document.createElement('div');
            s.className = 'mob-slide' + (p===0 ? ' active' : '');
            if (isAnimated(index, p)) {
                const aw = makeAnimWrap(index, 'position:absolute;inset:0;');
                s.appendChild(aw);
                if (p === 0) animPlay(aw); else animStop(aw);
            } else {
                s.style.backgroundImage = `url('${url}')`;
            }
            viewer.insertBefore(s, tapPrev);
        });

        thumbsEl.innerHTML = '';
        IMAGES[index].forEach((url, p) => {
            thumbsEl.appendChild(
                makeThumbEl(index, p, p===0?'active':'', e => { e.stopPropagation(); mobJumpPhoto(p); })
            );
        });

        updatePeek(index);
    }

    function showProject(index) {
        curProject=index; curPhoto=0;
        body.classList.add('is-detail');
        loadContent(index);
    }

    window.mobJumpPhoto = function(pi) {
        const slides = viewer.querySelectorAll('.mob-slide');
        const thumbs = thumbsEl.querySelectorAll('.mob-thumb');
        slides.forEach((s,i) => {
            s.classList.toggle('active', i===pi);
            const aw = s.querySelector('.anim-wrap');
            if (aw) { if (i===pi) animPlay(aw); else animStop(aw); }
        });
        thumbs.forEach((t,i) => t.classList.toggle('active', i===pi));
        curPhoto=pi;
    };

    function rotatePhoto(dir) {
        const c = viewer.querySelectorAll('.mob-slide').length;
        mobJumpPhoto((curPhoto+dir+c)%c);
    }

    window.mobSwitchProject = function(dir) {
        if (switching) return; switching=true;
        const ni=(curProject+dir+TITLES.length)%TITLES.length, outY=dir>0?'-55px':'55px';
        ss(mainBlock,{transition:`transform ${DUR}ms ${EASE},opacity ${Math.round(DUR*.65)}ms ${EASE}`,transform:`translateY(${outY})`,opacity:'0'});
        [peekTop,peekBot].forEach(pk=>ss(pk,{transition:`transform ${DUR}ms ${EASE},opacity ${Math.round(DUR*.55)}ms ${EASE}`,transform:`scale(0.88) translateY(${dir>0?'-18px':'18px'})`,opacity:'0'}));
        setTimeout(()=>{
            curProject=ni; curPhoto=0;
            loadContent(ni);
            const inY=dir>0?'55px':'-55px';
            ss(mainBlock,{transition:'none',transform:`translateY(${inY})`,opacity:'0'});
            [peekTop,peekBot].forEach(pk=>ss(pk,{transition:'none',transform:`scale(0.88) translateY(${dir>0?'18px':'-18px'})`,opacity:'0'}));
            requestAnimationFrame(()=>requestAnimationFrame(()=>{
                ss(mainBlock,{transition:`transform ${DUR}ms ${EASE},opacity ${Math.round(DUR*.8)}ms ${EASE}`,transform:'translateY(0)',opacity:'1'});
                [peekTop,peekBot].forEach(pk=>ss(pk,{transition:`transform ${DUR}ms ${EASE},opacity ${Math.round(DUR*.8)}ms ${EASE}`,transform:'scale(0.88)',opacity:'0.25'}));
                setTimeout(()=>{cs(mainBlock);cs(peekTop);cs(peekBot);switching=false;},DUR+60);
            }));
        },DUR*.42);
    };

    window.mobShrink = function() {
        body.classList.remove('is-detail');
        curProject=-1;
        cs(mainBlock); cs(peekTop); cs(peekBot);
        switching=false;
        document.querySelectorAll('#mob-detail .anim-wrap').forEach(animStop);
    };

    function ss(el,p){Object.assign(el.style,p);}
    function cs(el){el.style.transition='';el.style.transform='';el.style.opacity='';}
})();
</script>
